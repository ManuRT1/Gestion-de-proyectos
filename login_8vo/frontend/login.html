<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso al Sistema</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    body {
      transition: background-color 0.3s ease;
    }
    .card {
      border: none;
      border-radius: 15px;
    }
    .card-header {
      border-radius: 15px 15px 0 0 !important;
    }
  </style>
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">
  
  <div class="container" style="max-width: 400px;">
    <div class="card shadow-lg">
      <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center py-3">
        <h4 class="mb-0"><i class="bi bi-shield-lock-fill"></i> Login</h4>
        <button class="btn btn-outline-light btn-sm border-0" onclick="toggleDarkMode()" id="btnTheme">🌙</button>
      </div>
      
      <div class="card-body p-4">
        <form id="formLogin">
          <div class="mb-3">
            <label class="form-label fw-bold">Usuario</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input id="usuario" name="usuario" class="form-control" placeholder="Nombre de usuario" required />
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Contraseña</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-key"></i></span>
              <input id="password" name="password" type="password" class="form-control" placeholder="••••••••" required />
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100 py-2 shadow-sm">
            Entrar al Sistema <i class="bi bi-box-arrow-in-right ms-1"></i>
          </button>
        </form>
        
        <div id="msg" class="mt-3 text-center fw-medium" style="min-height: 24px;"></div>
      </div>
      
      <div class="card-footer text-muted text-center bg-transparent border-top-0 pb-3">
        <small class="d-block mb-1">Credenciales de prueba:</small>
        <span class="badge bg-secondary">admin / admin123</span>
        <span class="badge bg-secondary">ana / ana123</span>
      </div>
    </div>
  </div>

  <script>
    // Lógica del Tema (Modo Oscuro)
    function toggleDarkMode() {
        const htmlElement = document.documentElement;
        const currentTheme = htmlElement.getAttribute('data-bs-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        
        htmlElement.setAttribute('data-bs-theme', newTheme);
        document.getElementById('btnTheme').textContent = newTheme === 'dark' ? '☀️' : '🌙';
        localStorage.setItem('theme', newTheme);
    }

    // Persistencia del tema al cargar
    if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.setAttribute('data-bs-theme', 'dark');
        const btn = document.getElementById('btnTheme');
        if(btn) btn.textContent = '☀️';
    }
  </script>
  
  <script src="login.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
