<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Proyectos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="container py-4">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">Práctica - Gestión</a>
            <div class="ms-auto d-flex align-items-center">
                <button class="btn btn-outline-light btn-sm me-3" onclick="toggleDarkMode()" id="btnTheme">🌙</button>
                <span class="navbar-text text-white me-3" id="userInfo"></span>
                <a href="portada.html" class="btn btn-light btn-sm me-2">Volver</a>
                <button class="btn btn-danger btn-sm" onclick="logout()">Salir</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 class="my-4">Gestión de Proyectos</h1>
    <div id="contenedorNuevoProyecto" style="display: none;">
        <button class="btn btn-primary mb-4" data-bs-toggle="modal" data-bs-target="#modalProyecto">
            <i class="bi bi-plus-circle"></i> Nuevo Proyecto
        </button>
    </div> 
        
        <div id="listaProyectos"></div>
        
        <div id="sinProyectos" class="alert alert-info" style="display: none;">
            No hay proyectos registrados
        </div>
    </div>
    
    <div class="modal fade" id="modalProyecto" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Registrar Proyecto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formProyecto">
                        <input type="hidden" id="proyectoId" value="">
                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="nombre" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Descripción</label>
                            <textarea class="form-control" id="descripcion" rows="3"></textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Fecha de Entrega</label>
                            <input type="date" class="form-control" id="fecha" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Prioridad</label>
                            <select class="form-select" id="prioridad" required>
                                <option value="">Seleccionar...</option>
                                <option value="baja">Baja</option>
                                <option value="media">Media</option>
                                <option value="alta">Alta</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Responsable</label>
                            <select class="form-select" id="responsable" required>
                                <option value="">Cargando responsables...</option>
                            </select>
                        </div>
                        
                        <div class="modal-footer px-0 pb-0">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                            <button type="submit" class="btn btn-primary">Guardar Proyecto</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
<script>
    // Verificación de sesión al cargar
    const usuario = localStorage.getItem('usuario');
    const rol = localStorage.getItem('rol');

    if (!usuario) {
        window.location.href = 'login.html';
    } else {
        document.getElementById('userInfo').textContent = `${usuario} (${rol})`;
    }

    function logout() {
        // Limpiamos el acceso local
        localStorage.clear();
        // Redirigimos (el servidor ignorará las cookies si no hay token válido)
        window.location.href = 'login.html';
    }

    function toggleDarkMode() {
        const htmlElement = document.documentElement;
        const currentTheme = htmlElement.getAttribute('data-bs-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        
        htmlElement.setAttribute('data-bs-theme', newTheme);
        document.getElementById('btnTheme').textContent = newTheme === 'dark' ? '☀️' : '🌙';
        localStorage.setItem('theme', newTheme);
    }

    // Mantener el tema al recargar
    if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.setAttribute('data-bs-theme', 'dark');
        const btn = document.getElementById('btnTheme');
        if(btn) btn.textContent = '☀️';
    }
</script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="practica_basica.js"></script>
</body>
</html>
